server.port=${PORT:8081}
spring.application.name=loom-backend
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.llfcpjoysmehsrgevdof.supabase.co:5432/postgres?currentSchema=public}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=loom
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=loom
spring.flyway.default-schema=loom

application.security.jwt.secret-key=${JWT_SECRET}
app.cookie.domain=${COOKIE_DOMAIN:.arqulat.com}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Redis configuration
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# Tomcat and Payload Size Limits
server.tomcat.max-http-form-post-size=5MB
spring.servlet.multipart.max-request-size=5MB
